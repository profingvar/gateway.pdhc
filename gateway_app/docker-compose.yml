services:
  db:
    image: pgvector/pgvector:pg16
    container_name: gateway_pdhc_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway_pdhc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_pdhc_dev}
      POSTGRES_DB: ${POSTGRES_DB:-gateway_pdhc_db}
    ports:
      - "9051:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway_pdhc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gateway_pdhc_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway_pdhc}:${POSTGRES_PASSWORD:-gateway_pdhc_dev}@db:5432/${POSTGRES_DB:-gateway_pdhc_db}
    ports:
      - "9050:9050"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
